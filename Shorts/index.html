<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Shorts Clone</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<!-- TOP NAVBAR -->
<header class="topbar">
  <div class="left">
    <span class="menu">☰</span>
    <h2 class="logo">YouTube</h2>
  </div>

  <div class="search">
    <input type="text" placeholder="Search">
    <button>🔍</button>
  </div>

  <div class="right">
    <span>➕</span>
    <span>🔔</span>
    <div class="avatar">S</div>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="item">🏠<span>Home</span></div>
  <div class="item">🎬<span>Shorts</span></div>
  <div class="item">📺<span>Subscriptions</span></div>
  <div class="item">👤<span>You</span></div>
</aside>

<!-- MAIN -->
<main class="main">

  <div class="short-container">

    <!-- VIDEO -->
    <div class="video-card">
      <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted></video>

      <!-- RIGHT ACTIONS -->
      <div class="actions">
        <div class="action">👍<span>848K</span></div>
        <div class="action">👎<span>Dislike</span></div>
        <div class="action">💬<span>6,294</span></div>
        <div class="action">↗<span>Share</span></div>
      </div>
    </div>

    <!-- VIDEO INFO -->
    <div class="video-info">
      <div class="channel">
        <img src="https://i.pravatar.cc/40" alt="">
        <span>@MrBeast</span>
        <button>Subscribe</button>
      </div>

      <p class="title">
        Last To Leave Grocery Store, Wins $250,000
      </p>
    </div>

  </div>

</main>

</body>
</html>
